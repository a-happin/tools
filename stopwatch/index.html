<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex,nofollow">
    <title>Stopwatch</title>
    <style type="text/css">
    *, *::before, *::after
    {
      margin: 0;
      padding: 0;
      border: 0;
      box-sizing: border-box;
    }

    button
    {
      font: inherit;
      color: inherit;
    }

    html,body
    {
      height: 100%;
    }

    body
    {
      display: grid;
      place-items: center;
      place-content: center;

      font-family: monospace;
      font-weight: 700;
      font-feature-settings: "zero";
      font-variant-numeric: slashed-zero;

      & > *
      {
        grid-area: 1/1/1/1;
      }
    }

    #progress_bar
    {
      transform-origin: 50% 50%;
      transform: rotate(-90deg);
    }

    #time_view
    {
      font-size: 20vmin;
    }

    button.controll-button
    {
      --r: 35vmin;
      --a2: calc(var(--a) - 90deg);
      --x: calc(cos(var(--a2)) * var(--r));
      --y: calc(sin(var(--a2)) * var(--r));
      translate: var(--x) var(--y);

      width: 10vmin;
      height: 10vmin;
      border-radius: 20%;
      background-color: oklch(0.5 0 0 / 0.2);
      &:is(:hover,:active)
      {
        background-color: oklch(0.5 0 0 / 0.3);
      }
    }


    body[timer_status="running"]
    {
      & .play-icon
      {
        display: none;
      }
    }

    body:not([timer_status="running"])
    {
      & .pause-icon
      {
        display: none;
      }
    }

    body[timer_status="stopped"]
    {
      & #stop_button
      {
        display: none;
      }
    }

    :root
    {
      color: #666;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        color: #ffffff;
        background-color: #2c2f33;
      }
    }
    </style>
    <script type="module" src="main.js"></script>
  </head>
  <body timer_status="stopped">
    <svg width="100vmin" height="100vmin" viewBox="0 0 100 100" fill="none">
      <circle cx="50" cy="50" r="45" stroke="lightgray" stroke-width="1" />
      <circle cx="50" cy="50" r="45" stroke="#2080d0" stroke-width="1" stroke-dasharray="300 300" stroke-dashoffset="300" id="progress_bar" />
    </svg>
    <div id="time_view">00:00</div>
    <button id="stop_button" class="controll-button" style="--a:210deg;">
      <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 100 100">
        <path d="M32 20H68A12 12 90 0180 32V68A12 12 90 0168 80H32A12 12 90 0120 68V32A12 12 90 0132 20Z" fill="currentColor"></path>
      </svg>
    </button>
    <button id="start_button" class="controll-button" style="--a:180deg;">
      <svg width="100%" height="100%" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg" class="play-icon">
        <path fill="currentColor" stroke="currentColor" stroke-linejoin="round" stroke-miterlimit="10" stroke-width="2" d="M19.5816,55.6062 c0.4848,0.1782,1.0303,0.297,1.5758,0.297c0.8485,0,1.697-0.297,2.4242-0.7722l30-15.9793l0.303-0.297 c0.7879-0.7722,1.2121-1.7227,1.2121-2.7919c0-1.0692-0.4242-2.0791-1.2121-2.7919l-0.303-0.297l-30-16.0981 c-1.0909-0.8316-2.6667-1.0098-4-0.4752c-1.5152,0.594-2.4848,2.0791-2.4848,3.683v31.8397 C17.0967,53.5272,18.0664,55.0122,19.5816,55.6062z"/>
      </svg>
      <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 10 10" class="pause-icon">
        <path d="M3 3V7M7 3V7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"></path>
      </svg>
    </button>
  </body>
</html>
